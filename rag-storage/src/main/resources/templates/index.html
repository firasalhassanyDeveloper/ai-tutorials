<!DOCTYPE html>

<html lang="us" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>AI Chat</title>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 900px;
            margin: 30px auto;
        }

        #chat-box {
            border: 1px solid #ddd;
            height: 500px;
            overflow-y: auto;
            padding: 15px;
            margin-bottom: 15px;
        }

        .user-message {
            color: #1565c0;
            margin-bottom: 10px;
        }

        .ai-message {
            color: #2e7d32;
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            height: 100px;
        }

        button {
            margin-top: 10px;
            padding: 10px 20px;
        }

        .loading {
            color: gray;
            font-style: italic;
        }
    </style>
</head>
<body>

<h1>AI Chat Assistant</h1>

<div id="chat-box"></div>

<textarea id="prompt" placeholder="Ask a question..."></textarea>

<br>

<button onclick="sendMessage()">Send</button>

<script>

    async function sendMessage() {

        const promptElement = document.getElementById("prompt");
        const chatBox = document.getElementById("chat-box");

        const question = promptElement.value.trim();

        if (!question) {
            return;
        }

        chatBox.innerHTML +=
            `<div class="user-message"><strong>You:</strong> ${question}</div>`;

        promptElement.value = "";

        const loadingId = "loading-" + Date.now();

        chatBox.innerHTML +=
            `<div id="${loadingId}" class="loading">AI is thinking...</div>`;

        chatBox.scrollTop = chatBox.scrollHeight;

        try {

            const response = await fetch("/chat", {
                method: "POST",
                headers: {
                    "Content-Type": "text/plain"
                },
                body: question
            });

            const answer = await response.text();

            document.getElementById(loadingId).remove();

            chatBox.innerHTML +=
                `<div class="ai-message"><strong>AI:</strong> ${answer}</div>`;

        } catch (error) {

            document.getElementById(loadingId).remove();

            chatBox.innerHTML +=
                `<div class="ai-message">
                <strong>Error:</strong> Unable to contact server.
             </div>`;
        }

        chatBox.scrollTop = chatBox.scrollHeight;
    }

    document.getElementById("prompt")
        .addEventListener("keydown", function (event) {

            if (event.key === "Enter" && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        });

</script>

</body>
</html>
